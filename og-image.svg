<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Aurelius 网站导航收藏库</title>
  <desc id="desc">蓝色渐变背景上的 Aurelius 标题和网站导航收藏库副标题。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0066cc"/>
      <stop offset="100%" stop-color="#003d7a"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="180" fill="rgba(255,255,255,0.12)"/>
  <circle cx="160" cy="560" r="210" fill="rgba(255,255,255,0.10)"/>
  <text x="90" y="255" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="110" font-weight="700">Aurelius</text>
  <text x="96" y="350" fill="#e8f3ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="42">网站导航收藏库</text>
  <text x="96" y="420" fill="#cfe7ff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="30">搜索 · 图书 · 电影 · 动漫</text>
</svg>
