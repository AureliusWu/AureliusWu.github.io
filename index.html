<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurelius</title>
  <meta name="description" content="Aurelius 的个人项目索引">
  <meta name="author" content="AureliusWu">
  <meta name="theme-color" content="#ffffff">
  <link rel="canonical" href="https://aureliuswu.github.io/">
  <meta property="og:title" content="Aurelius">
  <meta property="og:description" content="个人项目索引">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aureliuswu.github.io/">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='78' font-size='82' font-weight='600' fill='%230071e3'>A</text></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #f5f5f7;
      --surface:  #ffffff;
      --border:   #d2d2d7;
      --text:     #1d1d1f;
      --secondary:#6e6e73;
      --tertiary: #aeaeb2;
      --accent:   #0071e3;
      --accent-h: #0077ed;
      --radius:   12px;
      --font:     -apple-system, "SF Pro Display", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      -webkit-font-smoothing: antialiased;
    }

    .wrap { width: 100%; max-width: 560px; }

    /* hero */
    .hero {
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(12px);
      animation: up .55s cubic-bezier(.4,0,.2,1) forwards;
    }

    .hero-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .08em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .hero-name {
      font-size: clamp(34px, 7vw, 48px);
      font-weight: 600;
      letter-spacing: -.02em;
      line-height: 1.08;
      color: var(--text);
      margin-bottom: 14px;
    }

    .hero-sub {
      font-size: 15px;
      color: var(--secondary);
      line-height: 1.6;
      max-width: 380px;
    }

    /* section */
    .section-label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .06em;
      color: var(--secondary);
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 0;
      animation: up .55s cubic-bezier(.4,0,.2,1) .1s forwards;
    }

    /* cards */
    .cards {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 48px;
      opacity: 0;
      animation: up .55s cubic-bezier(.4,0,.2,1) .18s forwards;
    }

    .card {
      display: grid;
      grid-template-columns: 1fr auto;
      grid-template-rows: auto auto;
      padding: 20px 20px 18px;
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: background .15s;
      position: relative;
    }

    .card:last-child { border-bottom: none; }
    .card:hover { background: #fafafa; }
    .card:active { background: #f0f0f0; }

    .card-header {
      grid-column: 1;
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 4px;
    }

    .card-icon {
      font-size: 15px;
      line-height: 1;
    }

    .card-title {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      letter-spacing: -.01em;
    }

    .card-arrow {
      grid-column: 2;
      grid-row: 1 / 3;
      align-self: center;
      margin-left: 16px;
      color: var(--tertiary);
      font-size: 13px;
      transition: color .15s, transform .15s;
    }

    .card:hover .card-arrow {
      color: var(--accent);
      transform: translateX(2px);
    }

    .card-desc {
      grid-column: 1;
      font-size: 13px;
      color: var(--secondary);
      line-height: 1.5;
      padding-left: 23px;
      margin-bottom: 10px;
    }

    .card-meta {
      grid-column: 1;
      padding-left: 23px;
    }

    .badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 500;
      padding: 2px 8px;
      border-radius: 20px;
      letter-spacing: .02em;
    }

    .badge-pwa   { background: #e8f1fb; color: #0071e3; }
    .badge-pages { background: #e9f8ef; color: #1a7f4b; }
    .badge-tool  { background: #f5f5f7; color: #6e6e73; border: 1px solid var(--border); }

    .card.disabled {
      pointer-events: none;
      opacity: .5;
    }

    /* footer */
    .footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      opacity: 0;
      animation: up .55s cubic-bezier(.4,0,.2,1) .28s forwards;
    }

    .footer-name {
      font-size: 13px;
      color: var(--secondary);
      letter-spacing: -.01em;
    }

    .footer-url {
      font-size: 11px;
      color: var(--tertiary);
      margin-top: 2px;
    }

    .gh-link {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 13px;
      color: var(--secondary);
      text-decoration: none;
      transition: color .15s;
    }

    .gh-link:hover { color: var(--accent); }
    .gh-icon { width: 14px; height: 14px; fill: currentColor; }

    @keyframes up {
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      body { padding: 44px 16px; }
      .hero { margin-bottom: 36px; }
      .card { padding: 18px 16px 16px; }
      .card-desc, .card-meta { padding-left: 23px; }
    }
  </style>
</head>
<body>
  <div class="wrap">

    <div class="hero">
      <div class="hero-label">Personal Projects</div>
      <div class="hero-name">Aurelius</div>
      <div class="hero-sub">工具与实验的集合，在这里记录正在构建的东西。</div>
    </div>

    <div class="section-label">Projects</div>

    <div class="cards">

      <a class="card" href="https://aureliuswu.github.io/FundVal/" target="_blank" rel="noopener">
        <div class="card-header">
          <span class="card-icon">◈</span>
          <span class="card-title">蜉蝣基金</span>
        </div>
        <div class="card-arrow">›</div>
        <div class="card-desc">个人基金盘中估值监控。交易时段自动刷新，双数据源容错，GitHub Gist 云同步持仓。</div>
        <div class="card-meta"><span class="badge badge-pwa">PWA</span></div>
      </a>

      <a class="card" href="https://aureliuswu.github.io/bookmarks/" target="_blank" rel="noopener">
        <div class="card-header">
          <span class="card-icon">⌖</span>
          <span class="card-title">Bookmarks</span>
        </div>
        <div class="card-arrow">›</div>
        <div class="card-desc">网站导航收藏库，支持关键词搜索与一键复制链接。</div>
        <div class="card-meta"><span class="badge badge-pages">GitHub Pages</span></div>
      </a>

      <a class="card" href="https://aureliuswu.github.io/book-of-hours/" target="_blank" rel="noopener">
        <div class="card-header">
          <span class="card-icon">◎</span>
          <span class="card-title">时之书</span>
        </div>
        <div class="card-arrow">›</div>
        <div class="card-desc">日记阅读器，支持 .docx 与 .md，年月日树形侧边栏，异步全文搜索。所有数据留在浏览器本地。</div>
        <div class="card-meta"><span class="badge badge-pages">GitHub Pages</span></div>
      </a>

    </div>

    <div class="footer">
      <div>
        <div class="footer-name">Aurelius Wu</div>
        <div class="footer-url">aureliuswu.github.io</div>
      </div>
      <a class="gh-link" href="https://github.com/AureliusWu" target="_blank" rel="noopener">
        <svg class="gh-icon" viewBox="0 0 24 24"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.605-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12z"/></svg>
        GitHub
      </a>
    </div>

  </div>
</body>
</html>
