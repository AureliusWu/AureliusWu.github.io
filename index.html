<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Aurelius</title>
  <meta name="description" content="Aurelius 的个人项目索引">
  <meta name="author" content="AureliusWu">
  <meta name="theme-color" content="#0d0d0d">
  <link rel="canonical" href="https://aureliuswu.github.io/">

  <meta property="og:title" content="Aurelius">
  <meta property="og:description" content="个人项目索引">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://aureliuswu.github.io/">

  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='75' font-size='75' font-weight='bold' fill='%230066cc'>A</text></svg>">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --bg2: #141414;
      --line: #2a2a2a;
      --text: #e8e8e8;
      --muted: #666;
      --accent: #c8a96e;
      --sans: 'Noto Sans SC', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    .hero {
      margin-bottom: 40px;
    }

    .hero-name {
      font-size: 28px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .hero-sub {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 1px;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 40px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 20px 16px;
      text-decoration: none;
      display: block;
      transition: border-color 0.2s, background 0.2s;
    }

    .card:hover {
      border-color: #444;
      background: #1a1a1a;
    }

    .card-icon {
      font-size: 20px;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .card-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 6px;
    }

    .card-desc {
      font-size: 12px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 14px;
    }

    .card-tag {
      display: inline-block;
      font-size: 10px;
      padding: 2px 8px;
      border-radius: 3px;
      letter-spacing: 0.5px;
    }

    .tag-pwa  { background: #1a2a3a; color: #6fb3ff; border: 1px solid #1e3a5a; }
    .tag-pages { background: #1a2e1a; color: #6fcf97; border: 1px solid #1e4a1e; }
    .tag-tool  { background: #2e2414; color: #f6c26b; border: 1px solid #4a3810; }

    .footer {
      border-top: 1px solid var(--line);
      padding-top: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-txt {
      font-size: 12px;
      color: var(--muted);
    }

    .gh-link {
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .gh-link:hover { color: var(--text); }

    .gh-icon {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="hero">
      <div class="hero-name">Aurelius</div>
      <div class="hero-sub">个人项目索引</div>
    </div>

    <div class="cards">
      <a class="card" href="https://aureliuswu.github.io/bookmarks/" target="_blank">
        <div class="card-icon">⌖</div>
        <div class="card-title">Bookmarks</div>
        <div class="card-desc">网站导航收藏库，支持搜索、深色模式与链接复制</div>
        <span class="card-tag tag-pages">GitHub Pages</span>
      </a>

      <a class="card" href="#" target="_blank">
        <div class="card-icon">◈</div>
        <div class="card-title">蜉蝣基金</div>
        <div class="card-desc">个人基金盘中估值监控，交易时间自动刷新</div>
        <span class="card-tag tag-pwa">PWA</span>
      </a>

      <a class="card" href="#" target="_blank">
        <div class="card-icon">◎</div>
        <div class="card-title">时之书</div>
        <div class="card-desc">日记阅读器，支持 .docx 与 .md，树形侧边栏</div>
        <span class="card-tag tag-tool">桌面工具</span>
      </a>
    </div>

    <div class="footer">
      <span class="footer-txt">aureliuswu.github.io</span>
      <a class="gh-link" href="https://github.com/AureliusWu" target="_blank">
        <svg class="gh-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61-.546-1.385-1.335-1.755-1.335-1.755-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 21.795 24 17.295 24 12c0-6.63-5.37-12-12-12"/>
        </svg>
        GitHub
      </a>
    </div>
  </div>
</body>
</html>
